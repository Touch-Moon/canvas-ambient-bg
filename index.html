<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Ambient Background</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Canvas layer ─────────────────────────────────────────── */

    #ambientCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      /* Values reverse-engineered from Apple Podcasts source */
      filter: blur(60px) saturate(2.75) brightness(0.7) contrast(1.9);
      transform: scale(1.08); /* hide blur-edge bleed */
    }

    /* ── Dark scrim ───────────────────────────────────────────── */

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 1;
    }

    /* ── Demo player UI ───────────────────────────────────────── */

    .player {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 0 40px 60px;
      gap: 0;
    }

    .artwork {
      width: min(280px, 70vw);
      aspect-ratio: 1;
      border-radius: 12px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.65);
      object-fit: cover;
      display: block;
      margin-bottom: 28px;
    }

    .track-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      text-align: center;
    }

    .track-sub {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      margin-bottom: 32px;
    }

    .progress {
      width: 100%;
      max-width: 320px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin-bottom: 32px;
      position: relative;
    }

    .progress::before {
      content: '';
      position: absolute;
      inset: 0 60% 0 0;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 2px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn-play {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      color: #1f1f1f;
      padding-left: 3px;
    }

    /* ── URL loader ───────────────────────────────────────────── */

    .loader {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    .loader input {
      width: 260px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 13px;
      backdrop-filter: blur(12px);
      outline: none;
    }

    .loader input::placeholder { color: rgba(255,255,255,0.4); }

    .loader button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(12px);
      transition: background 0.15s;
    }

    .loader button:hover { background: rgba(255, 255, 255, 0.28); }

    /* ── Control panel ─────────────────────────────────────────── */
    #panel {
      position: fixed; top: 20px; right: 20px; z-index: 20; width: 212px;
      padding: 15px 15px 13px; border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(20, 20, 22, 0.6);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    #panel h2 {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6); margin-bottom: 13px; font-weight: 600;
    }
    #panel .row { margin-bottom: 11px; }
    #panel label {
      display: flex; justify-content: space-between; font-size: 11px;
      color: rgba(255, 255, 255, 0.72); margin-bottom: 5px; letter-spacing: 0.02em;
    }
    #panel label output { color: #fff; font-variant-numeric: tabular-nums; }
    #panel input[type=range] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
      background: rgba(255, 255, 255, 0.25); border-radius: 2px; cursor: pointer; accent-color: #fff;
    }
    #panel input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: #fff; cursor: pointer;
    }
    #panel input[type=range]::-moz-range-thumb { width: 11px; height: 11px; border-radius: 50%; background: #fff; border: 0; cursor: pointer; }
    #panel .thumbs { display: flex; gap: 6px; margin-top: 3px; }
    #panel .thumbs img {
      width: 38px; height: 38px; border-radius: 6px; object-fit: cover; cursor: pointer;
      opacity: 0.5; border: 1.5px solid transparent; transition: opacity 0.15s, border-color 0.15s;
    }
    #panel .thumbs img.active, #panel .thumbs img:hover { opacity: 1; border-color: rgba(255, 255, 255, 0.6); }
    @media (max-width: 640px) { #panel { display: none; } }
  </style>
</head>
<body>

  <!-- Canvas ambient background -->
  <canvas id="ambientCanvas" aria-hidden="true"></canvas>
  <div class="scrim" aria-hidden="true"></div>

  <!-- Demo player UI -->
  <div class="player">
    <img id="artworkImg" class="artwork" src="sample.jpg" alt="Artwork" />
    <p class="track-title">Episode Title</p>
    <p class="track-sub">Podcast Name</p>
    <div class="progress"></div>
    <div class="controls">
      <!-- skip back -->
      <button class="btn" aria-label="Skip back">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          <text x="8" y="15.5" font-size="5" fill="currentColor" font-family="sans-serif" font-weight="700">15</text>
        </svg>
      </button>
      <!-- play -->
      <button class="btn btn-play" aria-label="Play">
        <svg width="20" height="22" viewBox="0 0 11 13" fill="currentColor">
          <path d="M0 0v13l11-6.5z"/>
        </svg>
      </button>
      <!-- skip forward -->
      <button class="btn" aria-label="Skip forward">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          <text x="8" y="15.5" font-size="5" fill="currentColor" font-family="sans-serif" font-weight="700">30</text>
        </svg>
      </button>
    </div>
  </div>

  <!-- Control panel -->
  <div id="panel">
    <h2>Controls</h2>
    <div class="row"><label>Saturate <output id="o-sat">2.75</output></label><input id="i-sat" type="range" min="0" max="4" step="0.05" value="2.75" /></div>
    <div class="row"><label>Brightness <output id="o-bri">0.70</output></label><input id="i-bri" type="range" min="0.2" max="1.5" step="0.05" value="0.7" /></div>
    <div class="row"><label>Contrast <output id="o-con">1.90</output></label><input id="i-con" type="range" min="0.5" max="3" step="0.05" value="1.9" /></div>
    <div class="row"><label>Blur <output id="o-blur">60</output></label><input id="i-blur" type="range" min="0" max="120" step="1" value="60" /></div>
    <div class="row"><label>Scrim <output id="o-scrim">0.38</output></label><input id="i-scrim" type="range" min="0" max="0.8" step="0.01" value="0.38" /></div>
    <div class="row"><label>Rotation <output id="o-rot">1.0</output></label><input id="i-rot" type="range" min="0" max="3" step="0.1" value="1" /></div>
    <div class="row"><label>Artwork</label>
      <div class="thumbs" id="thumbs">
        <img src="sample.jpg"  data-src="sample.jpg"  class="active" alt="Artwork 1" />
        <img src="sample2.jpg" data-src="sample2.jpg" alt="Artwork 2" />
        <img src="sample3.jpg" data-src="sample3.jpg" alt="Artwork 3" />
        <img src="sample4.jpg" data-src="sample4.jpg" alt="Artwork 4" />
      </div>
    </div>
  </div>

  <!-- Image URL loader -->
  <div class="loader">
    <input id="urlInput" type="text" placeholder="Paste image URL…" />
    <button id="loadBtn">Load</button>
  </div>

  <script type="module">
    import { AmbientCanvas } from './ambient-canvas.js';

    const canvas  = document.getElementById('ambientCanvas');
    const artwork = document.getElementById('artworkImg');
    const input   = document.getElementById('urlInput');
    const btn     = document.getElementById('loadBtn');

    const ac = new AmbientCanvas(canvas);
    ac.load('sample.jpg');

    const applyImage = (src) => {
      if (!src) return;
      ac.load(src);
      artwork.src = src;
    };

    btn.addEventListener('click', () => applyImage(input.value.trim()));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyImage(input.value.trim());
    });

    // ── Control panel ──────────────────────────────────────────
    const scrim = document.querySelector('.scrim');
    const filt = { sat: 2.75, bri: 0.7, con: 1.9, blur: 60 };
    const applyFilter = () =>
      (canvas.style.filter = `blur(${filt.blur}px) saturate(${filt.sat}) brightness(${filt.bri}) contrast(${filt.con})`);

    const slider = (id, fmt, onInput) => {
      const inp = document.getElementById('i-' + id);
      const out = document.getElementById('o-' + id);
      const upd = () => { const v = parseFloat(inp.value); out.textContent = fmt(v); onInput(v); };
      inp.addEventListener('input', upd);
      upd();
    };
    slider('sat',   (v) => v.toFixed(2),       (v) => { filt.sat = v;  applyFilter(); });
    slider('bri',   (v) => v.toFixed(2),       (v) => { filt.bri = v;  applyFilter(); });
    slider('con',   (v) => v.toFixed(2),       (v) => { filt.con = v;  applyFilter(); });
    slider('blur',  (v) => String(Math.round(v)), (v) => { filt.blur = v; applyFilter(); });
    slider('scrim', (v) => v.toFixed(2),       (v) => { scrim.style.background = `rgba(0,0,0,${v})`; });
    slider('rot',   (v) => v.toFixed(1),       (v) => { ac.speedScale = v; });

    const thumbs = document.getElementById('thumbs');
    thumbs.addEventListener('click', (e) => {
      const t = e.target.closest('img');
      if (!t) return;
      thumbs.querySelectorAll('img').forEach((i) => i.classList.toggle('active', i === t));
      applyImage(t.dataset.src);
    });
  </script>

</body>
</html>
